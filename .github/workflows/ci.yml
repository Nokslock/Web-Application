name: CI

# Run on every push and pull request
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code
      - uses: actions/checkout@v4

      # 2. Set up Node.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Install dependencies
      - run: npm ci

      # 4. Run linting
      - name: Lint
        run: npm run lint

      # 5. Run tests
      - name: Test
        run: npm test
